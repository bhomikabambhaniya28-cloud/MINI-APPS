<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark Saver</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #3b079b;
        --secondary: #241ab6;
        --light: #f8f9fa;
        --dark: #343a40;
        --success: #00b894;
        --danger: #d63031;
        --warning: #fdcb6e;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #8ca0f0;
        color: var(--dark);
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
        animation: fadeIn 0.8s ease;
      }

      header h1 {
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 0.5rem;
      }

      header p {
        color: #3506a1;
        font-size: 1.1rem;
      }

      .form-container {
        background: rgb(50, 22, 95);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        margin-bottom: 2rem;
        transition: all 0.3s ease;
      }

      .form-container:hover {
        box-shadow: 0 6px 25px rgba(0, 0, 0, 0.1);
      }

      #bookmarkForm {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      #bookmarkForm input,
      #bookmarkForm select {
        flex: 1;
        min-width: 200px;
        padding: 0.8rem 1rem;
        border: 1px solid #dfe6e9;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      #bookmarkForm input:focus,
      #bookmarkForm select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(76, 152, 223, 0.2);
      }

      #bookmarkForm button {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      #bookmarkForm button:hover {
        background-color: #6b86ce;
        transform: translateY(-2px);
      }

      .search-container {
        margin-bottom: 2rem;
        position: relative;
      }

      #search {
        width: 100%;
        padding: 0.8rem 1rem 0.8rem 3rem;
        border: 1px solid #dfe6e9;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      #search:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 169, 226, 0.2);
      }

      .search-container i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #7f8c8d;
      }

      .bookmarks-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
      }

      .bookmark-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
        animation: fadeIn 0.5s ease;
        display: flex;
        flex-direction: column;
      }

      .bookmark-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
      }

      .bookmark-image {
        height: 120px;
        background-color: var(--secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
      }

      .bookmark-content {
        padding: 1.5rem;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .bookmark-content h3 {
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
        color: var(--dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bookmark-content a {
        color: var(--primary);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        display: inline-block;
        word-break: break-all;
      }

      .bookmark-content a:hover {
        text-decoration: underline;
      }

      .category-tag {
        display: inline-block;
        padding: 0.3rem 0.8rem;
        background-color: #e0f2fe;
        color: #0369a1;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 500;
        margin-bottom: 1rem;
        align-self: flex-start;
      }

      .bookmark-actions {
        display: flex;
        justify-content: space-between;
        margin-top: auto;
      }

      .visit-btn {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .visit-btn:hover {
        background-color: #5649c0;
      }

      .delete-btn {
        background-color: #ffecec;
        color: var(--danger);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .delete-btn:hover {
        background-color: #ffd8d8;
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
        grid-column: 1 / -1;
      }

      .empty-state i {
        font-size: 3rem;
        color: #060e3a;
        margin-bottom: 1rem;
      }

      .empty-state p {
        color: #0e0863;
        font-size: 1.1rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        .container {
          padding: 1rem;
        }

        #bookmarkForm {
          flex-direction: column;
          gap: 0.8rem;
        }

        #bookmarkForm input,
        #bookmarkForm select,
        #bookmarkForm button {
          width: 100%;
        }

        .bookmarks-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1><i class="fas fa-bookmark"></i> Bookmark Saver</h1>
        <p>Save and organize your favorite websites</p>
      </header>

      <div class="form-container">
        <form id="bookmarkForm">
          <input type="text" id="title" placeholder="Website title" required />
          <input
            type="url"
            id="url"
            placeholder="https://example.com"
            required
          />
          <select id="category">
            <option value="General">General</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
            <option value="Learning">Learning</option>
            <option value="Entertainment">Entertainment</option>
          </select>
          <button type="submit">
            <i class="fas fa-plus"></i> Add Bookmark
          </button>
        </form>
      </div>

      <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="search" placeholder="Search bookmarks..." />
      </div>

      <div class="bookmarks-grid" id="bookmarksGrid">
        <!-- Bookmarks will be added here dynamically -->
      </div>
    </div>

    <script>
      // DOM Elements
      const bookmarkForm = document.getElementById("bookmarkForm");
      const bookmarksGrid = document.getElementById("bookmarksGrid");
      const searchInput = document.getElementById("search");

      // Load bookmarks from localStorage
      let bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];

      // Colors for different categories
      const categoryColors = {
        General: "#e0f2fe",
        Work: "#f0fdf4",
        Personal: "#fef2f2",
        Learning: "#fefce8",
        Entertainment: "#f5f3ff",
      };

      const categoryTextColors = {
        General: "#0369a1",
        Work: "#15803d",
        Personal: "#b91c1c",
        Learning: "#a16207",
        Entertainment: "#6d28d9",
      };

      // Save bookmarks to localStorage
      function saveBookmarks() {
        localStorage.setItem("bookmarks", JSON.stringify(bookmarks));
      }

      // Render bookmarks
      function renderBookmarks(filter = "") {
        bookmarksGrid.innerHTML = "";

        const filteredBookmarks = bookmarks.filter(
          (bookmark) =>
            bookmark.title.toLowerCase().includes(filter.toLowerCase()) ||
            bookmark.category.toLowerCase().includes(filter.toLowerCase()),
        );

        if (filteredBookmarks.length === 0) {
          bookmarksGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <p>No bookmarks found. Add some to get started!</p>
                    </div>
                `;
          return;
        }

        filteredBookmarks.forEach((bookmark) => {
          const bookmarkCard = document.createElement("div");
          bookmarkCard.className = "bookmark-card";

          // Extract domain for favicon simulation
          let domain = "";
          try {
            domain = new URL(bookmark.url).hostname.replace("www.", "");
          } catch (e) {
            domain = "link";
          }

          bookmarkCard.innerHTML = `
                    <div class="bookmark-image">
                        <i class="fas fa-globe"></i>
                    </div>
                    <div class="bookmark-content">
                        <h3>${bookmark.title}</h3>
                        <a href="${bookmark.url}" target="_blank">${bookmark.url}</a>
                        <span class="category-tag" style="background-color: ${categoryColors[bookmark.category] || "#e0f2fe"}; color: ${categoryTextColors[bookmark.category] || "#0369a1"}">
                            ${bookmark.category}
                        </span>
                        <div class="bookmark-actions">
                            <a href="${bookmark.url}" target="_blank" class="visit-btn">
                                <i class="fas fa-external-link-alt"></i> Visit
                            </a>
                            <button class="delete-btn" onclick="deleteBookmark('${bookmark.url}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;

          bookmarksGrid.appendChild(bookmarkCard);
        });
      }

      // Add new bookmark
      function addBookmark(e) {
        e.preventDefault();

        const title = document.getElementById("title").value.trim();
        const url = document.getElementById("url").value.trim();
        const category = document.getElementById("category").value;

        if (!title || !url) {
          alert("Please fill in all fields");
          return;
        }

        // Validate URL format
        try {
          new URL(url);
        } catch (e) {
          alert("Please enter a valid URL (include http:// or https://)");
          return;
        }

        const newBookmark = {
          title,
          url,
          category,
          createdAt: new Date().toISOString(),
        };

        bookmarks.unshift(newBookmark);
        saveBookmarks();
        renderBookmarks();
        bookmarkForm.reset();

        // Focus back on title input
        document.getElementById("title").focus();
      }

      // Delete bookmark
      function deleteBookmark(url) {
        if (confirm("Are you sure you want to delete this bookmark?")) {
          bookmarks = bookmarks.filter((bookmark) => bookmark.url !== url);
          saveBookmarks();
          renderBookmarks(searchInput.value);
        }
      }

      // Event listeners
      bookmarkForm.addEventListener("submit", addBookmark);
      searchInput.addEventListener("input", () =>
        renderBookmarks(searchInput.value),
      );

      // Initial render
      renderBookmarks();
    </script>
  </body>
</html>
